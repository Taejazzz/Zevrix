<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zevrix - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* CSS Variables - Beach Theme */
        :root {
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;

            --bg-primary: #faf8f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0ebe3;
            --text-primary: #2c3e50;
            --text-secondary: #5d6d7e;
            --text-muted: #85929e;
            --accent-primary: #4a90a4;
            --accent-secondary: #6bb3c9;
            --accent-success: #52b788;
            --accent-danger: #e07a5f;
            --border-color: rgba(74, 144, 164, 0.15);
            --card-shadow: 0 25px 50px -12px rgba(74, 144, 164, 0.15);
            --gradient-ocean: linear-gradient(135deg, #4a90a4 0%, #6bb3c9 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, #faf8f5 0%, #e0f7fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
        }

        /* Animations */
        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            animation: slideUpFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .login-header {
            background: var(--gradient-ocean);
            padding: 10px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            animation: float 10s infinite linear;
        }

        .logo-img {
            max-width: 280px;
            height: auto;
            margin: -20px auto 0;
            /* Negative top margin to reduce space */
            display: block;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.02);
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            font-weight: 500;
            position: relative;
            z-index: 1;
            letter-spacing: 0.5px;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: var(--font-body);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(74, 144, 164, 0.2);
            transform: translateY(-2px);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--gradient-ocean);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-heading);
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(74, 144, 164, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(74, 144, 164, 0.4);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-login .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--accent-danger);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-5px);
            }

            40%,
            80% {
                transform: translateX(5px);
            }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            padding: 0 15px;
        }

        .register-link {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .register-link a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .test-credentials {
            margin-top: 30px;
            padding: 20px;
            background: rgba(240, 235, 227, 0.5);
            border-radius: 16px;
            border: 1px dashed var(--border-color);
            transition: var(--transition);
        }

        .test-credentials:hover {
            background: rgba(240, 235, 227, 0.8);
            border-color: var(--accent-primary);
        }

        .test-credentials h4 {
            color: var(--text-primary);
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font-heading);
        }

        .test-credentials .credential {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        .test-credentials .credential:last-child {
            border-bottom: none;
        }

        .test-credentials .company {
            color: var(--text-primary);
            font-weight: 500;
        }

        .test-credentials .password {
            color: var(--text-muted);
            font-family: monospace;
        }

        .test-credentials .fill-btn {
            background: none;
            border: none;
            color: var(--accent-primary);
            cursor: pointer;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .test-credentials .fill-btn:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        /* Register Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .modal-header {
            padding: 24px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            color: var(--text-primary);
            font-size: 1.25rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 30px;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--accent-success);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="static/zevrix_logo.png" alt="Zevrix" class="logo-img">
                <p>Security Scanner Dashboard</p>
            </div>

            <div class="login-body">
                <div id="errorMessage" class="error-message"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="companyName">Company Name</label>
                        <div class="input-wrapper">
                            <span class="icon">🏢</span>
                            <input type="text" id="companyName" class="form-control"
                                placeholder="Enter your company name" required autocomplete="organization">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <span class="icon">🔒</span>
                            <input type="password" id="password" class="form-control" placeholder="Enter your password"
                                required autocomplete="current-password">
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <div class="divider">
                    <span>or</span>
                </div>

                <p class="register-link">
                    New company? <a href="#" onclick="showRegisterModal()">Create an account</a>
                </p>

                <div class="test-credentials">
                    <h4>🧪 Test Credentials</h4>
                    <div class="credential">
                        <span class="company">TechCorp</span>
                        <span class="password">techcorp123</span>
                        <button class="fill-btn" onclick="fillCredentials('TechCorp', 'techcorp123')">Use</button>
                    </div>
                    <div class="credential">
                        <span class="company">SecureInc</span>
                        <span class="password">secureinc123</span>
                        <button class="fill-btn" onclick="fillCredentials('SecureInc', 'secureinc123')">Use</button>
                    </div>
                    <div class="credential">
                        <span class="company">CyberDefense</span>
                        <span class="password">cyberdefense123</span>
                        <button class="fill-btn"
                            onclick="fillCredentials('CyberDefense', 'cyberdefense123')">Use</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Register New Company</h2>
                <button class="modal-close" onclick="hideRegisterModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="registerError" class="error-message"></div>
                <div id="registerSuccess" class="success-message"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="regCompanyName">Company Name</label>
                        <div class="input-wrapper">
                            <span class="icon">🏢</span>
                            <input type="text" id="regCompanyName" class="form-control" placeholder="Enter company name"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <div class="input-wrapper">
                            <span class="icon">🔒</span>
                            <input type="password" id="regPassword" class="form-control"
                                placeholder="Minimum 6 characters" required minlength="6">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regPasswordConfirm">Confirm Password</label>
                        <div class="input-wrapper">
                            <span class="icon">🔒</span>
                            <input type="password" id="regPasswordConfirm" class="form-control"
                                placeholder="Confirm your password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="registerBtn">
                        <span class="btn-text">Create Account</span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const API_BASE = window.API_CONFIG.BASE_URL;

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');
            const companyName = document.getElementById('companyName').value.trim();
            const password = document.getElementById('password').value;

            // Show loading
            btn.classList.add('loading');
            btn.disabled = true;
            errorDiv.classList.remove('show');

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        company_name: companyName,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Store company info
                    localStorage.setItem('zevrix_company', JSON.stringify(data.company));
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        // Register form handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('registerBtn');
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            const companyName = document.getElementById('regCompanyName').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;

            // Validate passwords match
            if (password !== passwordConfirm) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                successDiv.classList.remove('show');
                return;
            }

            // Show loading
            btn.classList.add('loading');
            btn.disabled = true;
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        company_name: companyName,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    successDiv.textContent = 'Account created! You can now login.';
                    successDiv.classList.add('show');
                    errorDiv.classList.remove('show');

                    // Fill login form with new credentials
                    setTimeout(() => {
                        hideRegisterModal();
                        fillCredentials(companyName, password);
                    }, 1500);
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        // Fill credentials helper
        function fillCredentials(company, password) {
            document.getElementById('companyName').value = company;
            document.getElementById('password').value = password;
        }

        // Modal functions
        function showRegisterModal() {
            document.getElementById('registerModal').classList.add('show');
            document.getElementById('registerForm').reset();
            document.getElementById('registerError').classList.remove('show');
            document.getElementById('registerSuccess').classList.remove('show');
        }

        function hideRegisterModal() {
            document.getElementById('registerModal').classList.remove('show');
        }

        // Close modal on outside click
        document.getElementById('registerModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal-overlay')) {
                hideRegisterModal();
            }
        });

        // Check if already logged in
        async function checkAuth() {
            try {
                // We will only redirect if we are SURE we are authenticated
                // and we are not currently trying to log in
                if (document.getElementById('loginBtn').classList.contains('loading')) return;

                const response = await fetch(`${API_BASE}/api/auth/status`, {
                    credentials: 'include'
                });
                const data = await response.json();

                if (data.authenticated) {
                    // Save to localStorage as a double-check
                    localStorage.setItem('zevrix_company', JSON.stringify(data.company));
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                // Connection issues, just stay here
            }
        }

        // Check auth on page load
        checkAuth();
    </script>
</body>

</html>
